<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jhenn - Prompts VEO3</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f0f23 100%);
            color: #e0e0e0;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        header {
            text-align: center;
            padding: 40px 20px;
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
            margin-bottom: 30px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
        }
        h1 {
            font-size: 2.5em;
            color: #ff6b9d;
            text-shadow: 0 0 20px rgba(255,107,157,0.5);
            margin-bottom: 10px;
        }
        .subtitle {
            color: #a0a0a0;
            font-size: 1.1em;
        }
        .day-section {
            margin-bottom: 50px;
        }
        .day-header {
            color: #c44dff;
            font-size: 1.8em;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid rgba(196,77,255,0.3);
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .day-header::before {
            content: '📅';
        }
        .prompt-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
        }
        .prompt-card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        .prompt-card:hover {
            transform: translateY(-5px);
            border-color: #ff6b9d;
            box-shadow: 0 10px 30px rgba(255,107,157,0.2);
        }
        .prompt-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 4px; height: 100%;
            background: linear-gradient(to bottom, #ff6b9d, #c44dff);
        }
        .prompt-title {
            color: #ff6b9d;
            font-size: 1.3em;
            margin-bottom: 10px;
            font-weight: 600;
        }
        .prompt-meta {
            color: #888;
            font-size: 0.9em;
            margin-bottom: 15px;
        }
        .prompt-preview {
            color: #ccc;
            line-height: 1.6;
            max-height: 120px;
            overflow: hidden;
            position: relative;
        }
        .prompt-preview::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 50px;
            background: linear-gradient(transparent, rgba(26,26,46,0.9));
        }
        .read-more {
            color: #ff6b9d;
            font-weight: 600;
            margin-top: 10px;
            display: inline-block;
        }
        .tag {
            display: inline-block;
            background: rgba(255,107,157,0.2);
            color: #ff6b9d;
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 0.8em;
            margin-right: 5px;
            margin-bottom: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🎬 Jhenn - VEO3 Prompts</h1>
            <p class="subtitle">Prompts cinematográficos para vídeos do TikTok</p>
        </header>

        <div class="day-section" id="daysContainer"></div>
    </div>

    <script>
        const promptsByDay = {
            "2026-03-23": [
                {
                    id: 'someone_you_loved_1',
                    title: 'Someone You Loved - Parte 1 (Intro)',
                    tags: ['Lewis Capaldi', 'Someone You Loved', 'Piano Cover', '8s', 'Parte 1/2'],
                    preview: 'Parte 1: Abertura emocional do cover. Mãos tocam o arpejo inicial, close no rosto expressivo, lágrima única...',
                    content: `## VEO3 Prompt - Someone You Loved (Parte 1 - 8s)

Gothic dark fantasy female pianist Jhenn, long dark purple hair, pale skin, black lipstick, wearing a simple black turtleneck.

Close-up of her hands playing the opening piano chords of "Someone You Loved" on a black grand piano in a dark cathedral. The arpeggios are delicate, melancholic. Candlelight flickers on the keys. Gothic arches in bokeh background.

Camera holds on her hands for first 3 seconds, showing the finger movement clearly. Then tilts up to her face.

Her eyes are closed, deeply feeling the emotion. As the vocal melody begins, she "sings" with facial expression — a slight tremor in her lower lip, eyes tightening with emotion.

Lighting: warm candlelight, cool blue side light. The light catches a single tear welling up in her right eye. Ultra-realistic skin texture.

Midway through this 8s clip (around 4s), the camera starts a very slow push-in on her face.

End frame: her expression is pained yet beautiful, eyes still closed, hands continuing to play seamlessly.

No actual singing — just the piano and her expressive face.

Duration: EXACTLY 8 seconds.
Format: Vertical 9:16, no audio.
This is PART 1 of 2.`,
                    metadata: {
                        postTitle: "Someone You Loved - Lewis Capaldi (piano cover) [Parte 1/2] 🖤 #jhenn",
                        hashtags: "#jhenn #someonouloved #lewiscapaldi #pianocover #gothic #emotional #fyp"
                    }
                },
                {
                    id: 'someone_you_loved_2',
                    title: 'Someone You Loved - Parte 2 (Clímax)',
                    tags: ['Lewis Capaldi', 'Someone You Loved', 'Piano Cover', '8s', 'Parte 2/2'],
                    preview: 'Parte 2: Clímax emocional. Mãos tocam com mais intensidade, rosto expresses pleading, lágrima cai,上行 piano...',
                    content: `## VEO3 Prompt - Someone You Loved (Parte 2 - 8s)

Continuation from Parte 1. Same gothic dark fantasy female pianist Jhenn, same dark cathedral setting, black grand piano.

The music swells into the chorus/emotional climax. Her playing becomes more intense: hands move with greater expression, pressing the keys with more weight. Her body leans forward slightly.

Close-up on her face: eyes now OPEN wide, looking upward as if pleading to the heavens. A single tear travels down her right cheek, catching the candlelight. Her lower lip trembles.

Lighting: dramatic increase in emotional intensity. The camera continues the slow push-in from Part 1, now extreme close-up on her eyes and cheek.

At 4s into this clip, show a brief shot of her hands playing the powerful chords (2s), then back to face for final 2s.

The final frame: her eyes are glistening, a mix of pain and beauty. The last piano chord lingers visually (hands held in air for a moment after playing).

No actual singing — just piano and raw emotion.

Duration: EXACTLY 8 seconds.
Format: Vertical 9:16, no audio.
This is PART 2 of 2.`,
                    metadata: {
                        postTitle: "Someone You Loved - Lewis Capaldi (piano cover) [Parte 2/2] 🖤 #jhenn",
                        hashtags: "#jhenn #someonouloved #lewiscapaldi #pianocover #gothic #emotional #fyp"
                    }
                }
            ]
        };

        const sortedDays = Object.keys(promptsByDay).sort((a, b) => new Date(b) - new Date(a));
        function formatDate(dateStr) {
            const [y, m, d] = dateStr.split('-');
            return `${d}/${m}/${y}`;
        }

        const container = document.getElementById('daysContainer');
        sortedDays.forEach(day => {
            const daySection = document.createElement('div');
            daySection.className = 'day-section';
            
            const header = document.createElement('div');
            header.className = 'day-header';
            header.textContent = formatDate(day);
            daySection.appendChild(header);
            
            const grid = document.createElement('div');
            grid.className = 'prompt-grid';
            
            promptsByDay[day].forEach(prompt => {
                const card = document.createElement('div');
                card.className = 'prompt-card';
                card.innerHTML = `
                    <div class="prompt-title">${prompt.title}</div>
                    <div class="prompt-meta">
                        ${prompt.tags.map(t => `<span class="tag">${t}</span>`).join(' ')}
                    </div>
                    <div class="prompt-preview">${prompt.preview}</div>
                `;
                grid.appendChild(card);
            });
            
            daySection.appendChild(grid);
            container.appendChild(daySection);
        });
    </script>
</body>
</html>
