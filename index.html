<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jhenn - Prompts VEO3</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f0f23 100%);
            color: #e0e0e0;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        header {
            text-align: center;
            padding: 40px 20px;
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
            margin-bottom: 30px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
        }
        h1 {
            font-size: 2.5em;
            color: #ff6b9d;
            text-shadow: 0 0 20px rgba(255,107,157,0.5);
            margin-bottom: 10px;
        }
        .subtitle {
            color: #a0a0a0;
            font-size: 1.1em;
        }
        .day-section {
            margin-bottom: 50px;
        }
        .day-header {
            color: #c44dff;
            font-size: 1.8em;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid rgba(196,77,255,0.3);
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .day-header::before {
            content: '📅';
        }
        .prompt-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
        }
        .prompt-card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        .prompt-card:hover {
            transform: translateY(-5px);
            border-color: #ff6b9d;
            box-shadow: 0 10px 30px rgba(255,107,157,0.2);
        }
        .prompt-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 4px; height: 100%;
            background: linear-gradient(to bottom, #ff6b9d, #c44dff);
        }
        .prompt-title {
            color: #ff6b9d;
            font-size: 1.3em;
            margin-bottom: 10px;
            font-weight: 600;
        }
        .prompt-meta {
            color: #888;
            font-size: 0.9em;
            margin-bottom: 10px;
        }
        .prompt-meta .meta-item {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 4px;
            font-size: 0.85em;
        }
        .prompt-meta .meta-icon {
            font-size: 1.1em;
        }
        .prompt-preview {
            color: #ccc;
            line-height: 1.6;
            max-height: 120px;
            overflow: hidden;
            position: relative;
        }
        .prompt-preview::after {
            content: '';
            position: absolute;
            bottom: 0; left: 0;
            width: 100%; height: 50px;
            background: linear-gradient(transparent, rgba(26,26,46,0.9));
        }
        .read-more {
            color: #ff6b9d;
            font-weight: 600;
            margin-top: 10px;
            display: inline-block;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 1000;
            padding: 20px;
            overflow-y: auto;
        }
        .modal-content {
            background: #1a1a2e;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 15px;
            max-width: 900px;
            margin: 40px auto;
            padding: 30px;
            position: relative;
        }
        .close-modal {
            position: absolute;
            top: 15px; right: 20px;
            font-size: 2em; color: #888;
            cursor: pointer; transition: color 0.2s;
        }
        .close-modal:hover { color: #ff6b9d; }
        .modal h2 { color: #ff6b9d; margin-bottom: 20px; font-size: 1.8em; }
        .modal-meta {
            background: rgba(255,107,157,0.1); border-radius: 8px; padding: 15px; margin-bottom: 25px; border-left: 4px solid #ff6b9d;
        }
        .modal-meta h3 { color: #ff6b9d; margin-bottom: 10px; font-size: 1.1em; }
        .modal-meta p { margin: 5px 0; color: #ffb3c6; font-size: 1.05em; }
        .modal-body {
            line-height: 1.8; color: #d0d0d0; white-space: pre-wrap; font-family: 'Consolas', monospace;
            background: rgba(0,0,0,0.3); padding: 20px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.05); max-height: 60vh; overflow-y: auto;
        }
        .copy-btn {
            background: rgba(255,107,157,0.2); color: #ff6b9d; border: 1px solid rgba(255,107,157,0.4); padding: 8px 16px; border-radius: 6px; cursor: pointer; font-size: 0.9em; margin-top: 10px; transition: all 0.2s;
        }
        .copy-btn:hover { background: rgba(255,107,157,0.3); }
        .tag {
            display: inline-block; background: rgba(255,107,157,0.2); color: #ff6b9d; padding: 3px 10px; border-radius: 12px; font-size: 0.8em; margin-right: 5px; margin-bottom: 5px;
        }
        #textEditContainer { background: rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; padding: 15px; margin: 15px 0; }
        #textEditContainer h3 { color: #ff6b9d; margin-bottom: 10px; }
        .text-edit-item { font-size: 0.95em; line-height: 1.6; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🎬 Jhenn - VEO3 Prompts</h1>
            <p class="subtitle">Prompts cinematográficos para vídeos do TikTok</p>

        <div class="day-section" id="daysContainer"></div>
    </div>

    <div class="modal" id="promptModal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeModal()">&times;</span>
            <h2 id="modalTitle"></h2>
            <div class="modal-meta">
                <h3>📱 Post Info</h3>
                <div class="meta-item">
                    <span class="meta-icon">🕐</span>
                    <span><strong>TikTok:</strong> <span id="modalTikTokTime"></span> (horário recomendado)</span>
                </div>
                <div class="meta-item">
                    <span class="meta-icon">🎬</span>
                    <span><strong>Cenário:</strong> <span id="modalScene"></span></span>
                </div>
                <div class="meta-item">
                    <span class="meta-icon">📝</span>
                    <span><strong>Legenda:</strong> <span id="modalPostTitle"></span></span>
                </div>
                <div style="margin-top: 8px;"><strong>Hashtags:</strong> <span id="modalHashtags"></span></div>
                <button class="copy-btn" onclick="copyPostInfo()">📋 Copiar legenda + hashtags</button>
            </div>
            <div class="modal-body" id="modalBody"></div>
            <div id="textEditContainer" style="margin-top: 30px;"></div>
        </div>
    </div>

    <script>
        // Todos os prompts organizados por data (YYYY-MM-DD)
        const promptsByDay = {
    "2026-03-30": [
        {

            "metadata": {

                {

                }
            ]
        },
        {
            "id": "nothing_else_matters_2",
            "title": "Nothing Else Matters - Side Angle (8-16s)",
            "tags": [
                "Metallica",
                "Nothing Else Matters",
                "Piano Cover",
                "Gothic",
                "8s",
                "Parte 2"
            ],
            "preview": "Câmera dentro do quarto, ângulo lateral. Jhenn continua tocando, perna exposta. Natural, handheld. Clímax da melodia.",
            "content": "## VEO3 Prompt - Metallica - Nothing Else Matters (Parte 2/2) — 8s

Same gothic dark fantasy woman Jhenn, same setting. Camera is inside the room, slightly to the side. She continues playing piano.

Lighting: Soft indoor light from window, gentle shadows.

Music: Continuation of Nothing Else Matters piano cover, building to emotional peak.

Style: Ultra realistic, 4k, vertical 9:16.

Duration: EXACTLY 8 seconds.",
            "metadata": {
                "postTitle": "Metallica - Nothing Else Matters (Final) 🎹 #jhenn",
                "hashtags": "#metallica #nothingelsematters #pianocover #metalcover #gothic #gothgirl #darkfantasy #instrumental #jhenn #fyp",

                "scene": "Inside room, side angle, leg visible, emotional climax"
            },
            "textEdits": [
                {
                    "position": "top",
                    "start": 0,
                    "end": 4,
                    "duration": 4,
                    "text": "Metallica - Final",
                    "style": "Fonte Gothic, tamanho 45px, cor branca #FFFFFF, sombra preta suave (offset 2px, blur 3px)"
                },
                {
                    "position": "bottom",
                    "start": 4,
                    "end": 8,
                    "duration": 4,
                    "text": "Siga para mais covers 🖤",
                    "style": "Fonte Gothic, tamanho 40px, cor cinza claro #C0C0C0"
                }
            ]
        }
    ]
};

        // Nova data de hoje (2026-03-28) - Nothing Else Matters
        promptsByDay["2026-03-28"] = [
            {
                id: 'metallica_ne_1_2803',
                title: "Metallica - Nothing Else Matters (Piano Cover) [Parte 1/2] (0-8s)",
                tags: ["Metallica", "Nothing Else Matters", "Piano Cover", "8s", "Parte 1"],
                preview: "Campo gramado à tarde chuvosa. Jhenn sentada no piano, tocas melody suave e melancólica. Câmera fixa estilo celular casual.",
                content: `## VEO3 Prompt - Metallica - Nothing Else Matters [Parte 1 de 2] — 8s

### Música (0-8s):
The iconic acoustic guitar arpeggio intro plays on piano (EADGBE tuning). Soft, gentle note arpeggios, then first gentle strum builds warmth. Begin the main verse: ...E7-A-D... gentle and intimate melody emerges, expressive and heartfelt.

### Cena:
A gothic dark fantasy woman named Jhenn, long dark purple hair slightly wet from light rain, pale skin, minimal gothic makeup, wearing a simple black outfit. She is sitting at a real upright piano placed in the middle of an open grassy field, distant mountains in the background under a cloudy sky.

### Performance:
Video starts with the camera slightly off-center and already recording, as if a phone was placed casually. Light rain is falling naturally, subtle droplets visible on the piano and her clothes. Wind gently moves her hair and the grass. She is already playing a soft emotional piano melody, hands moving naturally with perfect fingers.

### Camera:
Camera is fixed but imperfectly framed, like a real phone recording, slight shake and natural motion. Lighting is soft, overcast daylight, no dramatic effects, soft shadows only.

### Technical:
ultra realistic, natural imperfections, 4k resolution. No talking, no singing (piano only). Vertical 9:16 aspect ratio. Duration: EXACTLY 8 seconds.`,
                metadata: {
                    postTitle: "Metallica - Nothing Else Matters (Piano Cover) [Parte 1/2] 🎹 #jhenn",
                    hashtags: "#metallica #nothingelsematters #pianocover #gothic #metal #piano #cover #fyp #symphonic #jhenn_oficial",
                    tiktok_time: "19:30",
                    scene: "Open grassy field at rain, purple hair, mountains in distance"
                },
                textEdits: [
                    {
                        position: "top",
                        start: 0,
                        end: 3,
                        duration: 3,
                        text: "Nothing Else Matters",
                        style: "Fonte Gotica, tamanho 48px, cor branca #FFFFFF, sombra preta suave (offset 2px, blur 3px)"
                    },
                    {
                        position: "bottom",
                        start: 5,
                        end: 8,
                        duration: 3,
                        text: "Parte 1/2 - Siga para mais 🖤",
                        style: "Fonte Gotica, tamanho 35px, cor cinza claro #C0C0C0"
                    }
                ]
            },
            {
                id: 'metallica_ne_2_2803',
                title: "Metallica - Nothing Else Matters (Piano Cover) [Parte 2/2] (8-16s)",
                tags: ["Metallica", "Nothing Else Matters", "Piano Cover", "8s", "Parte 2", "Chão emocional"],
                preview: "Close nas mãos de Jhenn tocando piano, close no rosto contemplativo. Chão do campo continua gramado e chuvoso, montanhas desfocadas ao fundo.",
                content: `## VEO3 Prompt - Metallica - Nothing Else Matters [Parte 2 de 2] — 8s

### Música (8-16s total):
The main melody continues with increasing emotional depth. The famous chorus strikes: ...D-C-Bm... always gentle, intimate, filled with emotion and reverence. The melody builds then softens, ending with the last lyrical notes fading into silence.

### Cena:
The same open grassy field with light rain, distant mountains in the background under a cloudy sky. Continuation from Part 1. Jhenn continues her powerful yet tender piano performance, her purple rain-slicked hair cascading naturally, subtle droplets still visible.

### Performance:
Camera now closer and slightly to the side, capturing her hands and part of her face while she continues playing. She looks down at the keys, calm and introspective, rain lightly touching her skin and hair. Wind continues moving her hair and clothes subtly. Background shows depth with blurred mountains and moving grass, beautiful bokeh effect.

### Camera:
Camera handheld with very subtle movement, natural and imperfect. Lighting remains soft and cloudy, consistent with the first shot, overcast daylight creating a melancholic mood.

### Technical:
ultra realistic, 4k resolution, natural imperfections. Maybe a text overlay says "This song saved me 💜" at the end. No talking, no singing, piano only. Vertical 9:16 aspect ratio. Duration: EXACTLY 8 seconds.`,
                metadata: {
                    postTitle: "Metallica - Nothing Else Matters (Piano Cover) [Parte 2/2] 🎹 #jhenn",
                    hashtags: "#metallica #nothingelsematters #pianocover #gothic #metal #piano #cover #fyp #symphonic #jhenn",
                    tiktok_time: "19:30",
                    scene: "Close on hands & face, field background, lingering emotion"
                },
                textEdits: [
                    {
                        position: "bottom",
                        start: 5,
                        end: 8,
                        duration: 3,
                        text: "This song saved me 💜",
                        style: "Fonte Gotica, tamanho 42px, cor rosa claro #FFB3C6, sombra preta suave"
                    }
                ]
            }
        ];

        const sortedDays = Object.keys(promptsByDay).sort((a, b) => new Date(b) - new Date(a));
        function formatDate(dateStr) {
            const [y, m, d] = dateStr.split('-');
            return `${d}/${m}/${y}`;
        }

        const container = document.getElementById('daysContainer');
        let currentPrompt = null;

        sortedDays.forEach(day => {
            const daySection = document.createElement('div');
            daySection.className = 'day-section';
            
            const header = document.createElement('div');
            header.className = 'day-header';
            header.textContent = formatDate(day);
            daySection.appendChild(header);
            
            const grid = document.createElement('div');
            grid.className = 'prompt-grid';
            
            promptsByDay[day].forEach(prompt => {
                const card = document.createElement('div');
                card.className = 'prompt-card';
                card.onclick = () => openModal(prompt);
                card.innerHTML = `
                    <div class="prompt-title">${prompt.title}</div>
                    <div class="prompt-meta">
                        <div class="meta-item">
                            <span class="meta-icon">🕐</span>
                            <span>TikTok: ${prompt.metadata.tiktok_time || '19:00-20:00'}</span>
                        </div>
                        <div class="meta-item">
                            <span class="meta-icon">🎬</span>
                            <span>Cenário: ${prompt.metadata.scene || 'Gothic cathedral'}</span>
                        </div>
                        <div>
                            ${prompt.tags.map(t => `<span class="tag">${t}</span>`).join(' ')}
                        </div>
                    </div>
                    <div class="prompt-preview">${prompt.preview}</div>
                `;
                grid.appendChild(card);
            });
            
            daySection.appendChild(grid);
            container.appendChild(daySection);
        });

        function openModal(prompt) {
            currentPrompt = prompt;
            document.getElementById('modalTitle').textContent = prompt.title;
            document.getElementById('modalPostTitle').textContent = prompt.metadata.postTitle;
            document.getElementById('modalHashtags').textContent = prompt.metadata.hashtags;
            // Novos campos
            const timeEl = document.getElementById('modalTikTokTime');
            if (timeEl) timeEl.textContent = prompt.metadata.tiktok_time || '19:00-20:00 (padrão)';
            const sceneEl = document.getElementById('modalScene');
            if (sceneEl) sceneEl.textContent = prompt.metadata.scene || 'Gothic cathedral, candlelight';
            document.getElementById('modalBody').textContent = prompt.content;

            // Text Editing Section
            const textEditContainer = document.getElementById('textEditContainer');
            if (prompt.textEdits && prompt.textEdits.length > 0) {
                let html = '<h3>✏️ Edição de Texto (CapCut)</h3><p>Timestamps em segundos. Adicione estes textos no CapCut conforme os tempos:</p>';
                prompt.textEdits.forEach((edit, idx) => {
                    html += `
                        <div class="text-edit-item" style="background:rgba(255,107,157,0.1); padding:12px; margin:8px 0; border-radius:8px; border-left:3px solid #ff6b9d;">
                            <strong>${idx + 1}. ${edit.position.toUpperCase()}</strong><br>
                            ⏱️ <strong>Timing:</strong> ${edit.start}s - ${edit.end}s (duração: ${edit.duration}s)<br>
                            📝 <strong>Texto:</strong> "${edit.text}"<br>
                            🎨 <strong>Estilo:</strong> ${edit.style || 'Fonte gótica, cinza claro, sombra suave'}
                        </div>`;
                });
                textEditContainer.innerHTML = html;
            } else {
                textEditContainer.innerHTML = '<p><em>Nenhuma especificação de texto definida para este prompt.</em></p>';
            }

            document.getElementById('promptModal').style.display = 'block';
        }

        function copyPostInfo() {
            if (!currentPrompt) return;
            const text = currentPrompt.metadata.postTitle + '\n' + currentPrompt.metadata.hashtags;
            navigator.clipboard.writeText(text).then(() => {
                alert('📋 Legenda e hashtags copiadas!');
            }).catch(err => {
                console.error('Copy failed:', err);
            });
        }

        function closeModal() {
            document.getElementById('promptModal').style.display = 'none';
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeModal();
        });

        document.getElementById('promptModal').addEventListener('click', (e) => {
            if (e.target.id === 'promptModal') closeModal();
        });
    </script>
</body>
</html>
